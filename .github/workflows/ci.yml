name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-dev

      - name: Install maturin and Python dependencies
        run: |
          pip install "maturin>=1.5,<2.0" pyzmq msgpack pytest ruff

      - name: Build Rust extension
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: maturin build --release

      - name: Install wheel
        shell: bash
        run: pip install target/wheels/*.whl

      - name: Rust unit tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export LD_LIBRARY_PATH=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))"):${LD_LIBRARY_PATH:-}
          fi
          cargo test --manifest-path tyche-core/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path tyche-core/Cargo.toml -- -D warnings

      - name: Python tests
        run: pytest tests/ -v

      - name: Python lint (ruff)
        run: ruff check tyche/ tests/
